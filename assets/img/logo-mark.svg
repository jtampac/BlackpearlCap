<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Black Pearl Capital">
  <defs>
    <radialGradient id="bp" cx="35%" cy="30%" r="80%">
      <stop offset="0%"  stop-color="#f3eedf"/>
      <stop offset="20%" stop-color="#cfc8b8"/>
      <stop offset="48%" stop-color="#4a4d54"/>
      <stop offset="100%" stop-color="#0a0c10"/>
    </radialGradient>
  </defs>
  <!-- three black pearls in a triangular cluster, each ringed in champagne gold -->
  <g>
    <!-- top pearl -->
    <circle cx="16" cy="9"    r="7.0" fill="none" stroke="#C2A56A" stroke-width="0.7" opacity="0.7"/>
    <circle cx="16" cy="9"    r="6.2" fill="url(#bp)"/>
    <circle cx="13.6" cy="6.8" r="1.3" fill="#ffffff" opacity="0.5"/>
    <!-- bottom-left pearl -->
    <circle cx="9.5"  cy="21" r="7.0" fill="none" stroke="#C2A56A" stroke-width="0.7" opacity="0.7"/>
    <circle cx="9.5"  cy="21" r="6.2" fill="url(#bp)"/>
    <circle cx="7.1"  cy="18.8" r="1.3" fill="#ffffff" opacity="0.5"/>
    <!-- bottom-right pearl -->
    <circle cx="22.5" cy="21" r="7.0" fill="none" stroke="#C2A56A" stroke-width="0.7" opacity="0.7"/>
    <circle cx="22.5" cy="21" r="6.2" fill="url(#bp)"/>
    <circle cx="20.1" cy="18.8" r="1.3" fill="#ffffff" opacity="0.5"/>
  </g>
</svg>
